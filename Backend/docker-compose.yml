services:
  db:
    image: mysql:8.0
    container_name: mysql_db_library
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: webdb
    ports:
      - "3307:3306"
    volumes:
      - mysql_data_library:/var/lib/mysql
    networks:
      - library_network
    restart: always

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin_library
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8081:80"
    depends_on:
      - db
    networks:
      - library_network
    restart: always

networks:
  library_network:

volumes:
  mysql_data_library: